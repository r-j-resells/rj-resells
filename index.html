<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<!-- FIXED SUPABASE LOAD -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    top: 0;
    left: 0;
    z-index: -1;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
}

nav a {
    color: white;
    text-decoration: none;
}

header {
    padding-top: 80px;
    text-align: center;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: rgba(0,0,0,0.75);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
}

.btn {
    background: gold;
    color: black;
    padding: 10px;
    border-radius: 5px;
    margin-top: 10px;
    cursor: pointer;
}

/* MODAL */
.modal {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
z-index:999;
}

.modal-content {
background:#111;
margin:100px auto;
padding:20px;
width:80%;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="https://www.tiktok.com/@r_j_resells">TikTok</a>
</nav>

<header>
<h1>R&J Resells</h1>
<p>Authentic Designer. Exclusive Drops.</p>
</header>

<section id="shop" class="products">

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$30</p>
<button class="btn" onclick="openForm('Nike Ski Mask')">Buy</button>
</div>

<div class="product">
<img src="chromeheartshirt.jpg">
<h3>Chrome Hearts T-Shirt</h3>
<p>$65</p>
<button class="btn" onclick="openForm('Chrome Hearts T-Shirt')">Buy</button>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="productTitle"></h2>

<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="address" placeholder="Address"><br><br>

<button class="btn" onclick="submitOrder()">Continue</button>

<br><br>
<button class="btn" onclick="closeForm()">Close</button>

</div>
</div>

<script>
// 🔥 MAKE SURE SCRIPT RUNS AFTER LOAD
window.onload = function(){

const client = window.supabase.createClient(
"https://fyzguhksswalbwoqatym.supabase.co",
"sb_publishable_bqSCrrSbaWZ0DgYPj3pCTg_732i9dzN"
);

window.openForm = function(product){
    document.getElementById("modal").style.display="block";
    document.getElementById("productTitle").innerText=product;
    window.currentProduct = product;
}

window.closeForm = function(){
    document.getElementById("modal").style.display="none";
}

window.submitOrder = async function(){

    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;
    let address=document.getElementById("address").value;

    if(!name||!email||!address){
        alert("Fill all fields");
        return;
    }

    let id="RJ"+Math.floor(Math.random()*100000);

    await client.from("orders").insert([{
        id:id,
        product:window.currentProduct,
        name:name,
        email:email,
        address:address,
        status:"Pending"
    }]);

    window.location.href="https://cash.app/$RicoAmos10";
}

}
</script>

</body>
</html>
