<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:Arial;background:black;color:white;}
nav {padding:15px;text-align:center;border-bottom:1px solid #222;}
nav a {color:white;margin:0 15px;text-decoration:none;}

.logo {width:160px;}
.hero {text-align:center;padding:40px;}

.btn {background:gold;color:black;padding:10px;border:none;border-radius:5px;margin:5px;}

.products {display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;padding:20px;}
.product {background:#111;padding:10px;border-radius:10px;text-align:center;}

.input {width:90%;padding:10px;margin:5px;border:none;border-radius:5px;}

.modal {display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.8);}
.modal-content {background:#111;margin:10% auto;padding:20px;width:80%;border-radius:10px;text-align:center;}

#cart {position:fixed;top:10px;right:10px;background:#111;padding:10px;border-radius:10px;}

/* DASHBOARD */
#dashboard {display:none;padding:20px;}
.order {background:#111;padding:10px;margin:10px;border-radius:10px;}
</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="https://www.tiktok.com/@r_j_resells">TikTok</a>
<a href="#" onclick="toggleDashboard()">Dashboard</a>
</nav>

<header style="text-align:center;">
<img src="logo.png" class="logo">
</header>

<section class="hero">
<h1>R&J Resells</h1>
<p>Authentic Designer. Exclusive Drops.</p>
</section>

<div id="cart">🛒 <span id="cartCount">0</span></div>

<section id="shop" class="products">

<div class="product">
<img src="niketech.jpg" width="100%">
<h3>Nike Ski Mask</h3>
<p>$120</p>
<button class="btn" onclick="openModal('Nike Ski Mask',120)">Shop</button>
</div>

<div class="product">
<img src="bape.jpg" width="100%">
<h3>Bape Hoodie</h3>
<p>$250</p>
<button class="btn" onclick="openModal('Bape Hoodie',250)">Shop</button>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<div id="productView">
<h2 id="productName"></h2>
<p id="productPrice"></p>

<button class="btn" onclick="addToCart()">Add to Cart</button>

<input id="offerInput" class="input" placeholder="Offer $">
<button class="btn" onclick="sendOffer()">Send Offer</button>

<button class="btn" onclick="goToForm()">Buy</button>
</div>

<div id="formView" style="display:none;">
<h2>Shipping Info</h2>
<input id="name" class="input" placeholder="Name">
<input id="email" class="input" placeholder="Email">
<input id="address" class="input" placeholder="Address">
<button class="btn" onclick="confirmOrder()">Confirm</button>
</div>

<div id="confirmView" style="display:none;">
<h2>Order Created</h2>
<p id="orderNumber"></p>
<a href="https://cash.app/$RicoAmos10" class="btn">Pay</a>
</div>

<button class="btn" onclick="closeModal()">Close</button>

</div>
</div>

<!-- TRACK -->
<div style="text-align:center;">
<button class="btn" onclick="trackOrder()">Track Order</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Admin Dashboard</h2>
<div id="orders"></div>
</div>

<script>
let cart=0;
let orders=[];

function openModal(name,price){
document.getElementById("modal").style.display="block";
document.getElementById("productName").innerText=name;
document.getElementById("productPrice").innerText="$"+price;

document.getElementById("productView").style.display="block";
document.getElementById("formView").style.display="none";
document.getElementById("confirmView").style.display="none";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function addToCart(){
cart++;
document.getElementById("cartCount").innerText=cart;
}

function sendOffer(){
let offer=document.getElementById("offerInput").value;
alert("Offer sent: $"+offer);
}

function goToForm(){
document.getElementById("productView").style.display="none";
document.getElementById("formView").style.display="block";
}

function confirmOrder(){
let id="RJ"+Math.floor(Math.random()*100000);
let name=document.getElementById("name").value;

let order={
id:id,
name:name,
status:"Order Received"
};

orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

document.getElementById("orderNumber").innerText=id;

window.location.href="mailto:amosrico2@gmail.com?subject=Order "+id;

document.getElementById("formView").style.display="none";
document.getElementById("confirmView").style.display="block";

loadOrders();
}

function loadOrders(){
orders=JSON.parse(localStorage.getItem("orders"))||[];
let html="";
orders.forEach(o=>{
html+=`
<div class="order">
<p>${o.id} - ${o.name}</p>
<p>Status: ${o.status}</p>
<input placeholder="Update status" id="s${o.id}">
<button onclick="updateOrder('${o.id}')">Update</button>
</div>`;
});
document.getElementById("orders").innerHTML=html;
}

function updateOrder(id){
let val=document.getElementById("s"+id).value;
if(!val) return alert("Enter status");

orders=orders.map(o=>o.id===id?{...o,status:val}:o);
localStorage.setItem("orders",JSON.stringify(orders));
loadOrders();
}

function toggleDashboard(){
let d=document.getElementById("dashboard");
d.style.display=d.style.display==="none"?"block":"none";
loadOrders();
}

function trackOrder(){
let id=prompt("Order ID?");
orders=JSON.parse(localStorage.getItem("orders"))||[];
let o=orders.find(x=>x.id===id);
alert(o?o.status:"Not found");
}
</script>

</body>
</html>
