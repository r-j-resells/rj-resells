<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#ffffff;
--card:#f5f5f5;
--red:#ff0000;
--gray:#444;
}

body{
font-family:Arial,sans-serif;
background:#ffffff;
color:#ff0000;
overflow-x:hidden;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 40px;
display:flex;
justify-content:center;
gap:40px;
background:#ffffff;
border-bottom:1px solid rgba(255,0,0,.15);
z-index:9999;
}

nav a{
color:#ff0000;
text-decoration:none;
font-size:13px;
font-weight:bold;
letter-spacing:1px;
text-transform:uppercase;
}

header{
padding-top:170px;
padding-bottom:80px;
text-align:center;
}

header h1{
font-size:88px;
font-weight:900;
color:#ff0000;
}

.products{
max-width:1500px;
margin:auto;
padding:20px 40px 80px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:32px;
}

.product{
background:#fff;
padding:18px;
border:1px solid rgba(255,0,0,.15);
border-radius:20px;
}

.product img{
width:100%;
height:340px;
object-fit:cover;
border-radius:20px;
}

.btn{
width:100%;
padding:16px;
margin-top:18px;
border:none;
border-radius:16px;
background:#ff0000;
color:#fff;
font-weight:800;
cursor:pointer;
}

#modal{
display:none;
position:fixed;
inset:0;
background:rgba(255,255,255,.95);
}

.modal-content{
width:92%;
max-width:450px;
background:#fff;
margin:90px auto;
padding:34px;
border-radius:28px;
text-align:center;
border:1px solid rgba(255,0,0,.2);
}

.modal-content input{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid rgba(255,0,0,.3);
border-radius:16px;
color:#ff0000;
}

.authScreen{
position:fixed;
inset:0;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
}

.authBox{
width:92%;
max-width:430px;
background:#fff;
padding:42px;
border-radius:32px;
text-align:center;
border:1px solid rgba(255,0,0,.2);
}

.authBox h1{
color:#ff0000;
font-size:54px;
}

.authBox input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:16px;
border:1px solid rgba(255,0,0,.3);
color:#ff0000;
}

#authMsg{
color:#ff0000;
margin-top:10px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authGate" class="authScreen">
<div class="authBox">

<h1>R&J Resells</h1>

<input id="authEmail" placeholder="Email">
<input id="authPassword" type="password" placeholder="Password">

<button class="btn" onclick="signUp()">Sign Up</button>
<button class="btn" onclick="signIn()">Login</button>

<p id="authMsg"></p>

</div>
</div>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#ordersSection">Orders</a>
</nav>

<header>
<h1>R&J Resells</h1>
<p>Authentic Designer. Exclusive Drops.</p>
</header>

<section id="shop" class="products">

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$30</p>
<div class="btn" data-product="Nike Ski Mask">Buy</div>
</div>

</section>

<div id="modal">
<div class="modal-content">

<h2 id="productTitle"></h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="cashapp" placeholder="CashApp Name">
<input id="address" placeholder="Address">

<button class="btn" id="continueBtn">Continue to Payment</button>
<button class="btn" id="closeBtn">Close</button>

</div>
</div>

);

async function signUp(){

let password = document.getElementById("authPassword").value;

async function signIn(){
let email = document.getElementById("authEmail").value;
let password = document.getElementById("authPassword").value;

const { error } = await client.auth.signInWithPassword({ email, password });

if(error){
document.getElementById("authMsg").innerText = error.message;
return;
}

checkAuth();
}

</body>
</html>
