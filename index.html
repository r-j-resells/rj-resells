<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    top: 0;
    left: 0;
    z-index: -1;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
    z-index: 10;
}

nav a {
    color: white;
    text-decoration: none;
    font-size: 14px;
}

header {
    padding-top: 80px;
    text-align: center;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: rgba(0,0,0,0.75);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.btn {
    background: gold;
    color: black;
    padding: 10px;
    border-radius: 5px;
    text-decoration: none;
    display: inline-block;
    margin-top: 10px;
    cursor: pointer;
}

/* MODAL */
.modal {
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:100;
}

.modal-content {
background:#111;
margin:20% auto;
padding:20px;
width:85%;
border-radius:10px;
text-align:center;
}

input {
width:90%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="https://www.tiktok.com/@r_j_resells">TikTok</a>
<a href="#">Drops</a>
</nav>

<header>
<h1>R&J Resells</h1>
<p>Authentic Designer. Exclusive Drops.</p>
</header>

<section id="shop" class="products">

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$30</p>
<button class="btn" onclick="openCheckout('Nike Ski Mask')">Buy</button>
</div>

<div class="product">
<img src="bape.jpg">
<h3>Bape Hoodie</h3>
<p>$140</p>
<button class="btn" onclick="openCheckout('Bape Hoodie')">Buy</button>
</div>

<div class="product">
<img src="chromeheartshirt.jpg">
<h3>Chrome Hearts T-Shirt</h3>
<p>$65</p>
<button class="btn" onclick="openCheckout('Chrome Hearts T-Shirt')">Buy</button>
</div>

<div class="product">
<img src="chromehearts.jpg">
<h3>Chrome Hearts Socks</h3>
<p>$35</p>
<button class="btn" onclick="openCheckout('Chrome Hearts Socks')">Buy</button>
</div>

<div class="product">
<img src="bapeshirt.jpg">
<h3>Bape T-Shirt</h3>
<p>$65</p>
<button class="btn" onclick="openCheckout('Bape T-Shirt')">Buy</button>
</div>

<div class="product">
<img src="draco.jpg">
<h3>Draco Slides</h3>
<p>$70</p>
<button class="btn" onclick="openCheckout('Draco Slides')">Buy</button>
</div>

<div class="product">
<img src="lvbean.jpg">
<h3>Louis Vuitton Beanie</h3>
<p>$80</p>
<button class="btn" onclick="openCheckout('Louis Vuitton Beanie')">Buy</button>
</div>

</section>

<!-- CHECKOUT MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="productTitle"></h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<br><br>

<button class="btn" onclick="submitOrder()">Continue to Payment</button>
<br><br>
<button class="btn" onclick="closeCheckout()">Close</button>

</div>
</div>

<div style="text-align:center;padding:20px;">
Contact:
<a href="https://www.snapchat.com/add/ricoamos22">@ricoamos22</a> |
<a href="https://www.snapchat.com/add/jeffreylovej">@jeffreylovej</a>
</div>

<script>
let selectedProduct = "";

/* OPEN CHECKOUT */
function openCheckout(product){
    selectedProduct = product;

    document.getElementById("modal").style.display = "block";
    document.getElementById("productTitle").innerText = product;
}

/* CLOSE CHECKOUT */
function closeCheckout(){
    document.getElementById("modal").style.display = "none";
}

/* SUBMIT ORDER */
function submitOrder(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let address = document.getElementById("address").value;

    if(!name || !email || !address){
        alert("Fill all fields");
        return;
    }

    /* SAVE (optional safe fallback - no crash) */
    console.log({
        product: selectedProduct,
        name,
        email,
        address
    });

    closeCheckout();

    /* CASHAPP FINAL STEP */
    window.location.href = "https://cash.app/$RicoAmos10";
}
</script>

</body>
</html>
