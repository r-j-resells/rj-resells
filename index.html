<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<!-- 🔥 CHROME HEARTS STYLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>

/* BASE FONT */
body{
margin:0;
font-family:Arial, sans-serif;
color:white;

background:url('background.jpg') no-repeat center center fixed;
background-size:cover;
}

/* DARK OVERLAY */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* HEADER TITLE FONT (CHROME HEARTS STYLE) */
h1{
font-family:'UnifrakturCook', cursive;
letter-spacing:2px;
margin:5px 0;
}

/* HEADER */
header{
text-align:center;
padding:20px;
}

/* LOGO */
.logo{
width:120px;
border-radius:10px;
margin-bottom:10px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
padding:20px;
}

.product{
background:rgba(0,0,0,0.75);
padding:15px;
border-radius:10px;
text-align:center;
position:relative;
}

.product img{
width:100%;
border-radius:10px;
}

/* BUY BUTTON (UNCHANGED) */
.btn{
background:gold;
color:black;
padding:10px;
border-radius:5px;
display:inline-block;
margin-top:10px;
cursor:pointer;
border:none;
font-weight:bold;
}

/* SOLD OUT */
.sold{
opacity:0.5;
filter:grayscale(100%);
}

.sold::after{
content:"SOLD OUT";
position:absolute;
top:10px;
left:10px;
background:red;
padding:5px;
font-size:12px;
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
}

.modal-content{
background:#111;
margin:100px auto;
padding:20px;
width:80%;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:5px 0;
}

</style>
</head>

<body>

<header>

<!-- LOGO BACK -->
<img src="logo.png" class="logo">

<h1>R&J Resells</h1>
<p>Designer Resell Store</p>

</header>

<section class="products">

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$30</p>
<button class="btn" onclick="openForm('Nike Ski Mask')">Buy</button>
</div>

<div class="product">
<img src="chromeheartshirt.jpg">
<h3>Chrome Hearts Tee</h3>
<p>$50</p>
<button class="btn" onclick="openForm('Chrome Hearts Tee')">Buy</button>
</div>

<div class="product">
<img src="chromehearts.jpg">
<h3>Chrome Socks</h3>
<p>$35</p>
<button class="btn" onclick="openForm('Chrome Socks')">Buy</button>
</div>

<div class="product sold">
<img src="bape.jpg">
<h3>Bape Hoodie</h3>
<p>$100</p>
</div>

<div class="product sold">
<img src="bapeshirt.jpg">
<h3>Bape T-Shirt</h3>
<p>$50</p>
</div>

<div class="product sold">
<img src="draco.jpg">
<h3>Draco Slides</h3>
<p>$60</p>
</div>

<div class="product sold">
<img src="lvbean.jpg">
<h3>Louis Vuitton Beanie</h3>
<p>$50</p>
</div>

<div class="product">
<img src="uggs.jpg">
<h3>Ugg Slippers</h3>
<p>$40</p>
<button class="btn" onclick="openForm('Nike Ski Mask')">Buy</button>
</div>

</section>

<!-- FORM -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="title"></h2>

<input id="name" placeholder="Full Name"><br>
<input id="email" placeholder="Email"><br>
<input id="address" placeholder="Address"><br>

<button class="btn" onclick="submitOrder()">Continue to Payment</button>
<br><br>
<button class="btn" onclick="closeForm()">Close</button>

</div>
</div>

<script>

let currentProduct = "";

function openForm(product){
currentProduct = product;
document.getElementById("modal").style.display = "block";
document.getElementById("title").innerText = product;
}

function closeForm(){
document.getElementById("modal").style.display = "none";
}

const client = window.supabase.createClient(
"https://fyzguhksswalbwoqatym.supabase.co",
"sb_publishable_bqSCrrSbaWZ0DgYPj3pCTg_732i9dzN"
);

async function submitOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let address=document.getElementById("address").value;

if(!name||!email||!address){
alert("Please fill all fields");
return;
}

let id="RJ"+Math.floor(Math.random()*100000);

await client.from("orders").insert([{
id:id,
product:currentProduct,
name:name,
email:email,
address:address,
status:"Pending",
message:"Waiting for confirmation"
}]);

window.location.href="https://cash.app/$Jeffreybhd";
}

</script>

</body>
</html>
