<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
}

.logo {
    width: 200px;
    border-radius: 10px;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
}

.hero {
    text-align: center;
    padding: 40px 20px;
}

.btn {
    background: gold;
    color: black;
    padding: 12px 20px;
    text-decoration: none;
    font-weight: bold;
    border-radius: 5px;
    display: inline-block;
    margin-top: 10px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

footer {
    text-align: center;
    padding: 20px;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <h1>R&J Resells</h1>
</header>

<section class="hero">
    <p>Authentic Designer. Exclusive Drops.</p>
    <a href="#shop" class="btn">Shop Now</a>
</section>

<section id="shop" class="products">

<!-- Nike Ski Mask -->
<div class="product">
    <img src="niketech.jpg">
    <h3>Nike Ski Mask</h3>
    <p>$120</p>
    <a href="https://cash.app/$RicoAmos10" class="btn">Buy</a>
</div>

<!-- Bape Hoodie -->
<div class="product">
    <img src="bape.jpg">
    <h3>Bape Hoodie</h3>
    <p>$250</p>
    <a href="https://cash.app/$RicoAmos10" class="btn">Buy</a>
</div>

<!-- Chrome Hearts T-Shirt -->
<div class="product">
    <img src="chromeheartshirt.jpg">
    <h3>Chrome Hearts T-Shirt</h3>
    <p>$80</p>
    <a href="https://cash.app/$RicoAmos10" class="btn">Buy</a>
</div>

<!-- Chrome Heart Socks -->
<div class="product">
    <img src="chromehearts.jpg">
    <h3>Chrome Heart Socks</h3>
    <p>$40</p>
    <a href="https://cash.app/$RicoAmos10" class="btn">Buy</a>
</div>

</section>

<footer>
    <p>© 2026 R&J Resells | All Rights Reserved</p>
</footer>

</body>
</html>
