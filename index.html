<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<style>
body {margin:0;font-family:Arial;background:black;color:white;text-align:center;}

.btn {background:gold;color:black;padding:10px;border:none;border-radius:5px;margin-top:10px;}

.product {background:#111;padding:15px;margin:15px;border-radius:10px;}
.modal {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.modal-content {
background:#111;
margin:50% auto;
padding:20px;
width:80%;
border-radius:10px;
}
</style>
</head>

<body>

<h1>R&J Resells</h1>

<div class="product">
<h3>Nike Ski Mask</h3>
<p>$120</p>
<button class="btn" onclick="openModal('Nike Ski Mask',120)">Shop</button>
</div>

<div class="product">
<h3>Bape Hoodie</h3>
<p>$250</p>
<button class="btn" onclick="openModal('Bape Hoodie',250)">Shop</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="productName"></h2>
<p id="productPrice"></p>

<button class="btn" onclick="closeModal()">Close</button>

</div>
</div>

<script>
function openModal(name, price) {
document.getElementById("modal").style.display = "block";
document.getElementById("productName").innerText = name;
document.getElementById("productPrice").innerText = "$" + price;
}

function closeModal() {
document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
