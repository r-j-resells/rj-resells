<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* NAV */
nav {
    position: sticky;
    top: 0;
    background: black;
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #222;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
}

.logo {
    width: 180px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 50px 20px;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
}

/* BUTTON */
.btn {
    background: gold;
    color: black;
    padding: 10px 18px;
    border-radius: 5px;
    text-decoration: none;
    border: none;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

/* INPUT */
.input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: none;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #111;
    margin: 15% auto;
    padding: 20px;
    width: 80%;
    border-radius: 10px;
    text-align: center;
}

/* CART */
#cart {
    position: fixed;
    top: 10px;
    right: 10px;
    background: #111;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="https://www.tiktok.com/@r_j_resells">TikTok</a>
</nav>

<header>
<img src="logo.png" class="logo">
</header>

<section class="hero">
<h1>R&J Resells</h1>
<p>Authentic Designer. Exclusive Drops.</p>
</section>

<!-- CART -->
<div id="cart">
🛒 Cart: <span id="cartCount">0</span>
</div>

<!-- PRODUCTS -->
<section id="shop" class="products">

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$120</p>
<button onclick="openModal('Nike Ski Mask',120)" class="btn">Shop</button>
</div>

<div class="product">
<img src="bape.jpg">
<h3>Bape Hoodie</h3>
<p>$250</p>
<button onclick="openModal('Bape Hoodie',250)" class="btn">Shop</button>
</div>

<div class="product">
<img src="chromeheartshirt.jpg">
<h3>Chrome Hearts T-Shirt</h3>
<p>$80</p>
<button onclick="openModal('Chrome Hearts T-Shirt',80)" class="btn">Shop</button>
</div>

<div class="product">
<img src="chromehearts.jpg">
<h3>Chrome Hearts Socks</h3>
<p>$40</p>
<button onclick="openModal('Chrome Hearts Socks',40)" class="btn">Shop</button>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<div id="productView">
<h2 id="productName"></h2>
<p id="productPrice"></p>

<button onclick="addToCart()" class="btn">Add to Cart</button><br><br>

<input id="offerInput" placeholder="Enter your offer $" class="input">
<button onclick="sendOffer()" class="btn">Send Offer</button>

<br><br>
<button onclick="goToForm()" class="btn">Buy Now</button>
</div>

<div id="formView" style="display:none;">
<h2>Shipping Info</h2>

<input placeholder="Full Name" class="input"><br>
<input placeholder="Email" class="input"><br>
<input placeholder="Address" class="input"><br>

<button onclick="confirmOrder()" class="btn">Confirm Order</button>
</div>

<div id="confirmView" style="display:none;">
<h2>Order Created</h2>
<p id="orderNumber"></p>

<p>Wait for confirmation, then pay.</p>

<a href="https://cash.app/$RicoAmos10" class="btn">Pay Now</a>
</div>

<div id="trackingView" style="display:none;">
<h2>Tracking</h2>
<p id="trackingStatus">Processing</p>
</div>

<br>
<button onclick="closeModal()" class="btn">Close</button>

</div>
</div>

<!-- TRACK -->
<div style="text-align:center; padding:20px;">
<button onclick="trackOrder(prompt('Enter Order Number'))" class="btn">
Track Your Order
</button>
</div>

<footer style="text-align:center; padding:20px;">
<p>© 2026 R&J Resells</p>
</footer>

<script>
let cart = 0;

function openModal(name, price) {
document.getElementById("modal").style.display = "block";
document.getElementById("productName").innerText = name;
document.getElementById("productPrice").innerText = "$" + price;
}

function closeModal() {
document.getElementById("modal").style.display = "none";
}

function addToCart() {
cart++;
document.getElementById("cartCount").innerText = cart;
}

function sendOffer() {
let offer = document.getElementById("offerInput").value;
alert("Offer sent: $" + offer);
}

function goToForm() {
document.getElementById("productView").style.display = "none";
document.getElementById("formView").style.display = "block";
}

function confirmOrder() {
let orderId = "RJ" + Math.floor(Math.random()*100000);
document.getElementById("orderNumber").innerText = "Order #: " + orderId;

document.getElementById("formView").style.display = "none";
document.getElementById("confirmView").style.display = "block";

localStorage.setItem(orderId, "Order Received");
}

function trackOrder(orderId) {
let status = localStorage.getItem(orderId);
document.getElementById("trackingStatus").innerText = status || "Not Found";

document.getElementById("modal").style.display = "block";
document.getElementById("productView").style.display = "none";
document.getElementById("formView").style.display = "none";
document.getElementById("confirmView").style.display = "none";
document.getElementById("trackingView").style.display = "block";
}
</script>

</body>
</html>
