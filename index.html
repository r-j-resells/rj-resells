<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<!-- Chrome Hearts Style Font -->
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* BACKGROUND */
body{
margin:0;
font-family:'Inter', sans-serif;
color:white;
background:url('background.jpg') no-repeat center center fixed;
background-size:cover;
}

/* DARK OVERLAY */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

/* HEADER */
header{
text-align:center;
padding:30px 20px;
}

/* LOGO */
.logo{
width:120px;
margin-bottom:10px;
border-radius:10px;
}

/* TITLE */
h1{
font-family:'UnifrakturCook', cursive;
font-size:42px;
letter-spacing:3px;
margin:10px 0;
}

/* SUBTEXT */
header p{
opacity:0.8;
font-size:14px;
}

/* PRODUCTS GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:25px;
padding:20px;
}

/* PRODUCT CARD */
.product{
background:rgba(0,0,0,0.8);
padding:15px;
border-radius:12px;
text-align:center;
position:relative;
transition:0.3s;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* HOVER EFFECT */
.product:hover{
transform:translateY(-5px) scale(1.02);
box-shadow:0 0 20px rgba(255,215,0,0.3);
}

/* PRODUCT IMAGE */
.product img{
width:100%;
border-radius:10px;
}

/* PRODUCT TITLE */
.product h3{
margin:10px 0 5px;
font-weight:600;
}

/* PRICE */
.product p{
opacity:0.8;
}

/* BUTTON */
.btn{
background:linear-gradient(45deg,gold,#ffcc00);
color:black;
padding:10px;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

/* BUTTON HOVER */
.btn:hover{
transform:scale(1.05);
box-shadow:0 0 10px gold;
}

/* SOLD OUT STYLE */
.sold{
opacity:0.4;
filter:grayscale(100%);
}

/* BIG RED X */
.sold::before{
content:"✖";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:red;
font-weight:bold;
}

.sold::after{
content:"SOLD OUT";
position:absolute;
top:10px;
left:10px;
background:red;
padding:5px;
font-size:12px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
}

/* MODAL BOX */
.modal-content{
background:#111;
margin:80px auto;
padding:25px;
width:85%;
border-radius:12px;
text-align:center;
box-shadow:0 0 20px rgba(255,255,255,0.1);
}

/* INPUTS */
input{
width:90%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:none;
background:#222;
color:white;
}

</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>R&J Resells</h1>
<p>Authentic Designer. Exclusive Drops.</p>
</header>

<section class="products">

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$30</p>
<button class="btn" onclick="openForm('Nike Ski Mask')">Buy</button>
</div>

<div class="product">
<img src="chromeheartshirt.jpg">
<h3>Chrome Hearts Tee</h3>
<p>$50</p>
<button class="btn" onclick="openForm('Chrome Hearts Tee')">Buy</button>
</div>

<div class="product">
<img src="chromehearts.jpg">
<h3>Chrome Socks</h3>
<p>$35</p>
<button class="btn" onclick="openForm('Chrome Socks')">Buy</button>
</div>

<div class="product">
<img src="uggs.jpg">
<h3>Uggs Slippers</h3>
<p>$50</p>
<button class="btn" onclick="openForm('Chrome Socks')">Buy</button>
</div>

<div class="product sold">
<img src="bape.jpg">
<h3>Bape Hoodie</h3>
<p>$100</p>
</div>

<div class="product sold">
<img src="bapeshirt.jpg">
<h3>Bape T-Shirt</h3>
<p>$50</p>
</div>

<div class="product sold">
<img src="draco.jpg">
<h3>Draco Slides</h3>
<p>$60</p>
</div>

<div class="product sold">
<img src="lvbean.jpg">
<h3>Louis Vuitton Beanie</h3>
<p>$50</p>
</div>

<div class="product">
<img src="uggs.jpg">
<h3>Ugg Slippers</h3>
<p>$50</p>
</div>

</section>

<!-- FORM (UNCHANGED FUNCTIONALLY) -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="title"></h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<button class="btn" onclick="submitOrder()">Continue to Payment</button>
<br><br>
<button class="btn" onclick="closeForm()">Close</button>

</div>
</div>

<script>

let currentProduct = "";

function openForm(product){
currentProduct = product;
document.getElementById("modal").style.display = "block";
document.getElementById("title").innerText = product;
}

function closeForm(){
document.getElementById("modal").style.display = "none";
}

const client = window.supabase.createClient(
"https://fyzguhksswalbwoqatym.supabase.co",
"sb_publishable_bqSCrrSbaWZ0DgYPj3pCTg_732i9dzN"
);

async function submitOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let address=document.getElementById("address").value;

if(!name||!email||!address){
alert("Please fill all fields");
return;
}

let id="RJ"+Math.floor(Math.random()*100000);

await client.from("orders").insert([{
id:id,
product:currentProduct,
name:name,
email:email,
address:address,
status:"Pending",
message:"Waiting for confirmation"
}]);

window.location.href="https://cash.app/$RicoAmos10";
}

</script>

</body>
</html>
