<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* NAVBAR */
nav {
    position: sticky;
    top: 0;
    background: black;
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #222;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
}

.logo {
    width: 180px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
    animation: fadeIn 1.5s ease-in;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
}

.btn {
    background: gold;
    color: black;
    padding: 12px 20px;
    border-radius: 5px;
    text-decoration: none;
    font-weight: bold;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    transition: transform 0.2s;
}

.product:hover {
    transform: scale(1.05);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

/* MODAL (POPUP) */
.modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #111;
    margin: 15% auto;
    padding: 20px;
    width: 80%;
    border-radius: 10px;
    text-align: center;
}

/* TRUST */
.trust {
    text-align: center;
    padding: 30px;
    color: #aaa;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <a href="https://www.tiktok.com/@r_j_resells">TikTok</a>
</nav>

<header>
    <img src="logo.png" class="logo">
</header>

<section class="hero">
    <h1>R&J Resells</h1>
    <p>Authentic Designer. Exclusive Drops.</p>
    <br>
    <a href="#shop" class="btn">Shop Now</a>
</section>

<section id="shop" class="products">

<div class="product" onclick="openModal('Nike Ski Mask',120)">
    <img src="niketech.jpg">
    <h3>Nike Ski Mask</h3>
    <p>$120</p>
</div>

<div class="product" onclick="openModal('Bape Hoodie',250)">
    <img src="bape.jpg">
    <h3>Bape Hoodie</h3>
    <p>$250</p>
</div>

<div class="product" onclick="openModal('Chrome Hearts T-Shirt',80)">
    <img src="chromeheartshirt.jpg">
    <h3>Chrome Hearts T-Shirt</h3>
    <p>$80</p>
</div>

<div class="product" onclick="openModal('Chrome Hearts Socks',40)">
    <img src="chromehearts.jpg">
    <h3>Chrome Hearts Socks</h3>
    <p>$40</p>
</div>

</section>

<!-- POPUP -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="productName"></h2>
    <p id="productPrice"></p>
    <p>Authentic ✔ | Limited Stock</p>
    <a href="https://cash.app/$RicoAmos10" class="btn">Pay with Cash App</a>
    <br><br>
    <button onclick="closeModal()" class="btn">Close</button>
  </div>
</div>

<section class="trust">
    <p>✔ 100% Authentic Items</p>
    <p>✔ Fast Shipping</p>
    <p>✔ Limited Drops</p>
</section>

<footer>
    <p>© 2026 R&J Resells</p>
</footer>

<script>
function openModal(name, price) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("productName").innerText = name;
    document.getElementById("productPrice").innerText = "$" + price;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
