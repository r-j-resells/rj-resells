<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    /* BACKGROUND IMAGE */
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: -1;
}

/* NAV */
nav {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #222;
    background: rgba(0,0,0,0.7);
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
}

.logo {
    width: 160px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px;
}

/* BUTTON */
.btn {
    background: gold;
    color: black;
    padding: 10px 15px;
    border-radius: 5px;
    border: none;
    margin-top: 10px;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: rgba(0,0,0,0.8);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #111;
    margin: 30% auto;
    padding: 20px;
    width: 80%;
    border-radius: 10px;
    text-align: center;
}
</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="https://www.tiktok.com/@r_j_resells">TikTok</a>
</nav>

<header>
<img src="logo.png" class="logo">
</header>

<section class="hero">
<h1>R&J Resells</h1>
<p>Authentic Designer. Exclusive Drops.</p>
</section>

<section id="shop" class="products">

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$120</p>
<button onclick="openModal('Nike Ski Mask',120)" class="btn">Shop</button>
</div>

<div class="product">
<img src="bape.jpg">
<h3>Bape Hoodie</h3>
<p>$250</p>
<button onclick="openModal('Bape Hoodie',250)" class="btn">Shop</button>
</div>

<div class="product">
<img src="chromeheartshirt.jpg">
<h3>Chrome Hearts T-Shirt</h3>
<p>$80</p>
<button onclick="openModal('Chrome Hearts T-Shirt',80)" class="btn">Shop</button>
</div>

<div class="product">
<img src="chromehearts.jpg">
<h3>Chrome Hearts Socks</h3>
<p>$40</p>
<button onclick="openModal('Chrome Hearts Socks',40)" class="btn">Shop</button>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="productName"></h2>
<p id="productPrice"></p>

<a href="https://cash.app/$RicoAmos10" class="btn">Buy with CashApp</a>

<br><br>
<button onclick="closeModal()" class="btn">Close</button>

</div>
</div>

<footer style="text-align:center;padding:20px;">
<p>© 2026 R&J Resells</p>
</footer>

<script>
function openModal(name, price) {
document.getElementById("modal").style.display = "block";
document.getElementById("productName").innerText = name;
document.getElementById("productPrice").innerText = "$" + price;
}

function closeModal() {
document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
