<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top,#1c1c1c 0%,#0b0b0b 60%);
color:white;
padding:25px;
min-height:100vh;
}

/* LOGIN OVERLAY */
#adminLock{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(12px);
z-index:999999;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
font-family:Arial;
}

#adminLock h1{
font-size:42px;
margin-bottom:20px;
letter-spacing:1px;
}

#adminLock input{
padding:14px;
margin:10px;
width:280px;
border:none;
border-radius:14px;
background:#161616;
color:white;
font-size:15px;
outline:none;
border:1px solid rgba(255,255,255,0.06);
transition:.3s;
}

#adminLock input:focus{
border:1px solid gold;
box-shadow:0 0 12px rgba(255,215,0,0.25);
}

#adminLock button{
padding:14px 20px;
background:linear-gradient(135deg,gold,#ffcc00);
border:none;
border-radius:14px;
cursor:pointer;
font-weight:bold;
width:280px;
margin-top:10px;
transition:.25s;
font-size:15px;
}

#adminLock button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(255,215,0,0.25);
}

/* HEADER */
h1{
text-align:center;
margin-bottom:30px;
font-size:42px;
color:gold;
letter-spacing:1px;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-bottom:30px;
}

.card{
background:rgba(22,22,22,0.95);
padding:25px;
border-radius:22px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:rgba(255,215,0,0.25);
}

.card h3{
margin-bottom:10px;
font-size:18px;
color:#ccc;
}

.card p{
font-size:34px;
font-weight:bold;
color:gold;
}

/* ORDERS GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:22px;
}

/* ORDER CARD */
.order{
background:rgba(20,20,20,0.96);
padding:22px;
border-radius:22px;
border:1px solid rgba(255,255,255,0.05);
transition:.3s;
backdrop-filter:blur(8px);
position:relative;
overflow:hidden;
}

.order:hover{
transform:translateY(-5px);
border-color:rgba(255,215,0,0.2);
}

.order::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:4px;
background:linear-gradient(90deg,gold,#ff9900);
}

.order h3{
margin-top:8px;
margin-bottom:16px;
font-size:24px;
color:gold;
}

.order p{
margin:8px 0;
color:#ddd;
line-height:1.4;
}

/* STATUS BADGES */
.badge{
padding:7px 14px;
border-radius:999px;
font-size:12px;
display:inline-block;
margin-top:10px;
font-weight:bold;
letter-spacing:.5px;
}

.Pending{
background:#ffd54f;
color:black;
}

.Confirmed{
background:#42a5f5;
color:white;
}

.Shipped{
background:#ff9800;
color:black;
}

.Delivered{
background:#00c853;
color:white;
}

/* INPUTS */
input,
textarea,
select{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:12px;
background:#101010;
color:white;
font-size:14px;
outline:none;
border:1px solid rgba(255,255,255,0.05);
transition:.25s;
}

textarea{
min-height:100px;
resize:vertical;
}

input:focus,
textarea:focus,
select:focus{
border:1px solid gold;
box-shadow:0 0 12px rgba(255,215,0,0.15);
}

/* BUTTONS */
button{
margin-top:14px;
padding:13px;
width:100%;
border:none;
border-radius:14px;
background:linear-gradient(135deg,gold,#ffcc00);
cursor:pointer;
font-weight:bold;
font-size:14px;
transition:.25s;
color:black;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(255,215,0,0.2);
}

/* MOBILE */
@media(max-width:700px){

body{
padding:15px;
}

h1{
font-size:32px;
}

.order{
padding:18px;
}

.card p{
font-size:28px;
}

}

</style>
