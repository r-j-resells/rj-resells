<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg:#070707;
--card:#111111;
--gold:#89CFF0;
--white:#ffffff;
--gray:#b8b8b8;
}

body{
font-family:Arial,sans-serif;
background:
linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.88)),
url('background.jpg') no-repeat center center fixed;
background-size:cover;
color:var(--white);
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 40px;
display:flex;
justify-content:center;
gap:40px;
background:rgba(8,8,8,.72);
backdrop-filter:blur(18px);
z-index:9999;
}

nav a{
color:#89CFF0;
text-decoration:none;
font-size:13px;
font-weight:bold;
text-transform:uppercase;
}

/* HEADER */
header{
padding-top:170px;
padding-bottom:80px;
text-align:center;
}

header h1{
font-size:88px;
font-weight:900;
color:#89CFF0;
}

/* PRODUCTS */
.products{
max-width:1500px;
margin:auto;
padding:20px 40px 80px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:32px;
}

.product{
background:#111;
padding:18px;
border-radius:26px;
border:1px solid rgba(255,255,255,.06);
}

.product img{
width:100%;
height:340px;
object-fit:cover;
border-radius:20px;
}

.product h3{font-size:24px;margin-top:18px;}
.product p{color:#89CFF0;font-weight:bold;margin-top:10px;}

/* BUY BUTTON */
.btn{
width:100%;
padding:16px;
margin-top:18px;
border:none;
border-radius:16px;
background:#fff;
color:#89CFF0;
font-weight:800;
cursor:pointer;
}

/* MODAL */
#modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
z-index:10000;
}

.modal-content{
width:92%;
max-width:450px;
background:#000;
margin:90px auto;
padding:34px;
border-radius:28px;
text-align:center;
}

/* AUTH SCREEN */
.authScreen{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:flex;
align-items:center;
justify-content:center;
z-index:999999;
}

.authBox{
width:92%;
max-width:430px;
background:#000;
padding:42px;
border-radius:32px;
text-align:center;
}

/* CART (HIDDEN UNTIL LOGIN) */
#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#fff;
color:#89CFF0;
padding:14px 18px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
z-index:999999;
display:none;
}

#cartPanel{
position:fixed;
top:0;
right:-400px;
width:320px;
height:100%;
background:#000;
border-left:1px solid rgba(255,255,255,.1);
z-index:1000000;
padding:20px;
transition:.3s;
overflow-y:auto;
}

#cartPanel.open{right:0;}

.cartItem{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.1);
color:#89CFF0;
}

.cartCheckout{
margin-top:20px;
width:100%;
padding:12px;
background:#fff;
color:#89CFF0;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authGate" class="authScreen">
<div class="authBox">
<h1 style="color:#89CFF0;">R&J Resells</h1>

<input id="authEmail" placeholder="Email">
<input id="authPassword" type="password" placeholder="Password">

<button class="btn" onclick="signUp()">Sign Up</button>
<button class="btn" onclick="signIn()">Login</button>

<p id="authMsg"></p>
</div>
</div>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#ordersSection">Orders</a>
<a href="https://www.tiktok.com/@r_j_resells">TikTok</a>
</nav>

<header>
<h1>R&J Resells</h1>
<p>Authentic Designer. Exclusive Drops.</p>
</header>

<!-- PRODUCTS -->
<section id="shop" class="products">

<div class="product"><img src="nikeski.jpg"><h3>Nike Ski Mask</h3><p>$30</p><div class="btn" data-product="Nike Ski Mask">Buy</div></div>
<div class="product"><img src="bape.jpg"><h3>Bape Hoodie</h3><p>$100</p><div class="btn" data-product="Bape Hoodie">Buy</div></div>
<div class="product"><img src="chromeheartshirt.jpg"><h3>Chrome Hearts T-Shirt</h3><p>$50</p><div class="btn" data-product="Chrome Hearts T-Shirt">Buy</div></div>
<div class="product"><img src="chromehearts.jpg"><h3>Chrome Hearts Socks</h3><p>$35</p><div class="btn" data-product="Chrome Hearts Socks">Buy</div></div>

</section>

<!-- MODAL -->
<div id="modal"></div>

<!-- ORDERS -->
<section id="ordersSection">
<h2>Orders</h2>
<div id="orders"></div>
</section>

<!-- CART UI -->
<div id="cartBtn">Cart</div>

<div id="cartPanel">
<h2 style="color:#89CFF0;">Cart</h2>
<div id="cartItems"></div>
<button class="cartCheckout" onclick="checkoutCart()">Checkout</button>
</div>

<script>
const client = window.supabase.createClient(
"https://fyzguhksswalbwoqatym.supabase.co",
"sb_publishable_bqSCrrSbaWZ0DgYPj3pCTg_732i9dzN"
);

let selectedProduct = "";
let cart = [];

/* AUTH */
async function checkAuth(){
const { data } = await client.auth.getUser();

if(data.user){
document.getElementById("authGate").style.display = "none";
document.getElementById("cartBtn").style.display = "block"; // CART ONLY AFTER LOGIN
loadOrders();
}else{
document.getElementById("authGate").style.display = "flex";
document.getElementById("cartBtn").style.display = "none";
}
}
checkAuth();

/* LOGIN */
async function signUp(){
let email = document.getElementById("authEmail").value;
let password = document.getElementById("authPassword").value;

await client.auth.signUp({email,password});
await client.auth.signInWithPassword({email,password});
checkAuth();
}

async function signIn(){
let email = document.getElementById("authEmail").value;
let password = document.getElementById("authPassword").value;

await client.auth.signInWithPassword({email,password});
checkAuth();
}

/* CART */
document.getElementById("cartBtn").onclick = () => {
document.getElementById("cartPanel").classList.toggle("open");
};

document.querySelectorAll(".btn[data-product]").forEach(btn=>{
btn.addEventListener("click",()=>{
cart.push(btn.dataset.product);
renderCart();
});
});

function renderCart(){
let box = document.getElementById("cartItems");
box.innerHTML="";
cart.forEach(i=>{
box.innerHTML += `<div class="cartItem">${i}</div>`;
});
}

function checkoutCart(){
alert("Cart checkout not connected yet");
}

/* ORDERS (UNCHANGED LOGIC KEPT) */
async function loadOrders(){
const { data:userData } = await client.auth.getUser();
if(!userData.user) return;

const { data } = await client.from("orders")
.select("*")
.eq("user_id", userData.user.id)
.order("id",{ascending:false});

let container=document.getElementById("orders");
container.innerHTML="";

data.forEach(order=>{
container.innerHTML+=`
<div>
<h3>${order.product}</h3>
<p>${order.status}</p>
</div>`;
});
}
</script>

</body>
</html>
