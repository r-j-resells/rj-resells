<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
}

header {
    padding: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: #111;
    padding: 15px;
    border-radius: 10px;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.btn {
    background: gold;
    color: black;
    padding: 10px;
    border: none;
    border-radius: 5px;
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
}
</style>
</head>

<body>

<header>
<h1>R&J Resells</h1>
<p>Designer Resale Store</p>
</header>

<section class="products">

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$120</p>
<a class="btn" href="https://cash.app/$RicoAmos10">Buy with CashApp</a>
</div>

<div class="product">
<img src="bape.jpg">
<h3>Bape Hoodie</h3>
<p>$250</p>
<a class="btn" href="https://cash.app/$RicoAmos10">Buy with CashApp</a>
</div>

<div class="product">
<img src="chromeheartshirt.jpg">
<h3>Chrome Hearts T-Shirt</h3>
<p>$80</p>
<a class="btn" href="https://cash.app/$RicoAmos10">Buy with CashApp</a>
</div>

<div class="product">
<img src="chromehearts.jpg">
<h3>Chrome Hearts Socks</h3>
<p>$40</p>
<a class="btn" href="https://cash.app/$RicoAmos10">Buy with CashApp</a>
</div>

</section>

</body>
</html>
