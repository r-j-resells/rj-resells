<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    z-index:-1;
}

/* MESSAGE BAR */
#messageBar{
position:fixed;
top:0;
width:100%;
background:gold;
color:black;
text-align:center;
padding:10px;
display:none;
z-index:999;
}

/* NAV */
nav{
position:fixed;
top:40px;
width:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
gap:20px;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
}

/* HEADER */
header{
padding-top:100px;
text-align:center;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
padding:20px;
}

.product{
background:rgba(0,0,0,0.75);
padding:15px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

.btn{
background:gold;
color:black;
padding:10px;
border:none;
border-radius:5px;
margin-top:10px;
cursor:pointer;
}

/* FORM MODAL */
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:1000;
}

.modal-content{
background:#111;
margin:40% auto;
padding:20px;
width:80%;
border-radius:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:8px;
border:none;
border-radius:5px;
}

/* CONTACT */
.contact{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="messageBar"></div>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="https://www.tiktok.com/@r_j_resells">TikTok</a>
<a href="#">Drops</a>
</nav>

<header>
<h1>R&J Resells</h1>
<p>Authentic Designer. Exclusive Drops.</p>
</header>

<section class="products">

<!-- PRODUCTS -->

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$30</p>
<button class="btn" onclick="openForm('Nike Ski Mask')">Buy</button>
</div>

<div class="product">
<img src="bape.jpg">
<h3>Bape Hoodie</h3>
<p>$100</p>
<button class="btn" onclick="openForm('Bape Hoodie')">Buy</button>
</div>

<div class="product">
<img src="chromeheartshirt.jpg">
<h3>Chrome Hearts T-Shirt</h3>
<p>$50</p>
<button class="btn" onclick="openForm('Chrome Hearts T-Shirt')">Buy</button>
</div>

<div class="product">
<img src="chromehearts.jpg">
<h3>Chrome Hearts Socks</h3>
<p>$35</p>
<button class="btn" onclick="openForm('Chrome Hearts Socks')">Buy</button>
</div>

<div class="product">
<img src="bapeshirt.jpg">
<h3>Bape T-Shirt</h3>
<p>$50</p>
<button class="btn" onclick="openForm('Bape T-Shirt')">Buy</button>
</div>

<div class="product">
<img src="draco.jpg">
<h3>Draco Slides</h3>
<p>$60</p>
<button class="btn" onclick="openForm('Draco Slides')">Buy</button>
</div>

<div class="product">
<img src="lvbean.jpg">
<h3>Louis Vuitton Beanie</h3>
<p>$50</p>
<button class="btn" onclick="openForm('Louis Vuitton Beanie')">Buy</button>
</div>

</section>

<!-- FORM -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="productTitle"></h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<button class="btn" onclick="submitOrder()">Continue to Payment</button>
<br><br>
<button class="btn" onclick="closeForm()">Cancel</button>

</div>
</div>

<div class="contact">
Contact:
<a href="https://www.snapchat.com/add/ricoamos22">@ricoamos22</a> |
<a href="https://www.snapchat.com/add/jeffreylovej">@jeffreylovej</a>
</div>

<script>
const client = window.supabase.createClient(
"https://fyzguhksswalbwoqatym.supabase.co",
"sb_publishable_bqSCrrSbaWZ0DgYPj3pCTg_732i9dzN"
);

let currentProduct="";

/* OPEN FORM */
function openForm(product){
currentProduct = product;
document.getElementById("modal").style.display="block";
document.getElementById("productTitle").innerText=product;
}

/* CLOSE FORM */
function closeForm(){
document.getElementById("modal").style.display="none";
}

/* SUBMIT ORDER */
async function submitOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let address=document.getElementById("address").value;

if(!name || !email || !address){
alert("Fill all fields");
return;
}

let id="RJ"+Math.floor(Math.random()*100000);

await client.from("orders").insert([{
id:id,
product:currentProduct,
name:name,
email:email,
address:address,
status:"Pending",
message:""
}]);

window.location.href="https://cash.app/$RicoAmos10";
}

/* LOAD ADMIN MESSAGE */
async function loadMessage(){

let { data } = await client
.from("orders")
.select("*")
.order("id",{ascending:false})
.limit(1);

if(data && data.length>0){
let msg=data[0].message;

if(msg && msg.includes("http")){
document.getElementById("messageBar").style.display="block";
document.getElementById("messageBar").innerHTML =
`✅ Your Order was Confirmed — 
<a href="${msg}" target="_blank" style="color:black;font-weight:bold;">Track Here</a>`;
}
}
}

loadMessage();
</script>

</body>
</html>
