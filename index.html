<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<style>
body {
margin:0;
font-family:Arial;
background:black;
color:white;
}

header{
text-align:center;
padding:30px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
padding:20px;
}

.product{
background:#111;
padding:15px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

.btn{
background:gold;
color:black;
padding:10px;
border:none;
border-radius:5px;
display:inline-block;
margin-top:10px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
}

.modal-content{
background:#111;
margin:100px auto;
padding:20px;
width:80%;
border-radius:10px;
text-align:center;
}
</style>

</head>

<body>

<header>
<h1>R&J Resells</h1>
<p>Designer Resell Store</p>
</header>

<section class="products">

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$30</p>
<button class="btn" onclick="openForm('Nike Ski Mask')">Buy</button>
</div>

<div class="product">
<img src="chromeheartshirt.jpg">
<h3>Chrome Hearts Tee</h3>
<p>$65</p>
<button class="btn" onclick="openForm('Chrome Hearts Tee')">Buy</button>
</div>

<div class="product">
<img src="chromehearts.jpg">
<h3>Chrome Socks</h3>
<p>$35</p>
<button class="btn" onclick="openForm('Chrome Socks')">Buy</button>
</div>

</section>

<!-- FORM -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="title"></h2>

<input id="name" placeholder="Full Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="address" placeholder="Address"><br><br>

<button class="btn" onclick="submitOrder()">Continue to Payment</button>
<br><br>
<button class="btn" onclick="closeForm()">Close</button>

</div>
</div>

<script>

let currentProduct = "";

// OPEN FORM
function openForm(product){
currentProduct = product;
document.getElementById("modal").style.display = "block";
document.getElementById("title").innerText = product;
}

// CLOSE FORM
function closeForm(){
document.getElementById("modal").style.display = "none";
}

// SUBMIT FORM
function submitOrder(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let address = document.getElementById("address").value;

if(!name || !email || !address){
alert("Please fill out all fields");
return;
}

// redirect to CashApp AFTER form
window.location.href = "https://cash.app/$RicoAmos10";
}

</script>

</body>
</html>
