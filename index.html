<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Resells</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.btn {
    background: gold;
    color: black;
    padding: 10px;
    display: inline-block;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}

/* FORM */
.modal {
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.modal-content {
background:#111;
margin:40% auto;
padding:20px;
width:80%;
text-align:center;
border-radius:10px;
}

input {
width:90%;
padding:10px;
margin:5px;
}
</style>
</head>

<body>

<header>
<h1>R&J Resells</h1>
<p>Authentic Designer</p>
</header>

<section class="products">

<div class="product">
<img src="niketech.jpg">
<h3>Nike Ski Mask</h3>
<p>$30</p>
<div class="btn" onclick="openForm('Nike Ski Mask')">Buy</div>
</div>

<div class="product">
<img src="bape.jpg">
<h3>Bape Hoodie</h3>
<p>$100</p>
<div class="btn" onclick="openForm('Bape Hoodie')">Buy</div>
</div>

<div class="product">
<img src="chromeheartshirt.jpg">
<h3>Chrome Hearts T-Shirt</h3>
<p>$50</p>
<div class="btn" onclick="openForm('Chrome Hearts T-Shirt')">Buy</div>
</div>

<div class="product">
<img src="chromehearts.jpg">
<h3>Chrome Hearts Socks</h3>
<p>$35</p>
<div class="btn" onclick="openForm('Chrome Hearts Socks')">Buy</div>
</div>

<div class="product">
<img src="bapeshirt.jpg">
<h3>Bape T-Shirt</h3>
<p>$50</p>
<div class="btn" onclick="openForm('Bape T-Shirt')">Buy</div>
</div>

<div class="product">
<img src="draco.jpg">
<h3>Draco Slides</h3>
<p>$60</p>
<div class="btn" onclick="openForm('Draco Slides')">Buy</div>
</div>

<div class="product">
<img src="lvbean.jpg">
<h3>Louis Vuitton Beanie</h3>
<p>$50</p>
<div class="btn" onclick="openForm('Louis Vuitton Beanie')">Buy</div>
</div>

</section>

</section>

<!-- FORM -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="productTitle"></h2>

<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<input id="address" placeholder="Address"><br>

<div class="btn" onclick="submitOrder()">Submit</div>
<div class="btn" onclick="closeForm()">Close</div>

</div>
</div>

<script>
const client = window.supabase.createClient(
"https://fyzguhksswalbwoqatym.supabase.co",
"sb_publishable_bqSCrrSbaWZ0DgYPj3pCTg_732i9dzN"
);

let currentProduct="";

function openForm(product){
currentProduct=product;
document.getElementById("modal").style.display="block";
document.getElementById("productTitle").innerText=product;
}

function closeForm(){
document.getElementById("modal").style.display="none";
}

async function submitOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let address=document.getElementById("address").value;

if(!name || !email || !address){
alert("Fill everything");
return;
}

await client.from("orders").insert([{
product:currentProduct,
name:name,
email:email,
address:address
}]);

alert("Order submitted!");

}
</script>

</body>
</html>
