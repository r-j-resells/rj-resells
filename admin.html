<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {background:black;color:white;font-family:Arial;padding:20px;}
.card {background:#111;padding:15px;margin:10px;border-radius:10px;}
button {padding:8px;margin:5px;border:none;border-radius:5px;}
.confirm {background:green;}
.decline {background:red;}
</style>
</head>

<body>

<h1>Admin Dashboard</h1>
<div id="orders"></div>

<script>
const client = window.supabase.createClient(
"https://fyzguhksswalbwoqatym.supabase.co",
"sb_publishable_bqSCrrSbaWZ0DgYPj3pCTg_732i9dzN"
);

async function load(){
let {data}=await client.from("orders").select("*");

let html="";
data.forEach(o=>{
html+=`
<div class="card">
<h3>${o.id}</h3>
<p>${o.product}</p>
<p>${o.name}</p>
<p>${o.email}</p>
<p>${o.address}</p>
<p>Status: ${o.status}</p>

<button class="confirm" onclick="confirmOrder('${o.id}')">Confirm</button>
<button class="decline" onclick="declineOrder('${o.id}')">Decline</button>
</div>
`;
});

document.getElementById("orders").innerHTML=html;
}

async function confirmOrder(id){
await client.from("orders").update({status:"Confirmed"}).eq("id",id);
alert("Send this to customer:\nhttps://snapchat.com/t/p0bV0vxl");
load();
}

async function declineOrder(id){
await client.from("orders").update({status:"Declined"}).eq("id",id);
load();
}

load();
</script>

</body>
</html>
