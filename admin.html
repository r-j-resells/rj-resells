<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Admin Dashboard</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.stats{
display:flex;
justify-content:space-around;
margin-bottom:20px;
}

.card{
background:#161616;
padding:15px;
border-radius:10px;
text-align:center;
width:30%;
}

.order{
background:#151515;
padding:15px;
margin-bottom:15px;
border-radius:12px;
border:1px solid #2a2a2a;
}

.badge{
padding:5px 10px;
border-radius:20px;
font-size:12px;
display:inline-block;
}

.Pending{background:gold;color:black;}
.Confirmed{background:#2196f3;}
.Shipped{background:orange;color:black;}
.Delivered{background:#00c853;}

input, textarea, select{
width:100%;
padding:8px;
margin-top:5px;
background:#0f0f0f;
border:none;
color:white;
border-radius:6px;
}

button{
margin-top:10px;
padding:10px;
background:gold;
border:none;
cursor:pointer;
width:100%;
border-radius:6px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
}
</style>
</head>

<body>

<h1>R&J Admin Dashboard</h1>

<div class="stats">
<div class="card">
<h3>Total Orders</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pending">0</p>
</div>

<div class="card">
<h3>Shipped</h3>
<p id="shipped">0</p>
</div>
</div>

<div id="orders" class="grid"></div>

<script>
const client = window.supabase.createClient(
"https://fyzguhksswalbwoqatym.supabase.co",
"sb_publishable_bqSCrrSbaWZ0DgYPj3pCTg_732i9dzN"
);

async function loadOrders(){

const { data } = await client
.from("orders")
.select("*")
.order("id", { ascending:false });

let total = data.length;
let pending = data.filter(o=>o.status==="Pending").length;
let shipped = data.filter(o=>o.status==="Shipped").length;

document.getElementById("total").innerText = total;
document.getElementById("pending").innerText = pending;
document.getElementById("shipped").innerText = shipped;

let container = document.getElementById("orders");
container.innerHTML = "";

data.forEach(order=>{

container.innerHTML += `
<div class="order">

<h3>${order.product}</h3>

<p><b>Name:</b> ${order.name}</p>
<p><b>Email:</b> ${order.email}</p>
<p><b>Address:</b> ${order.address}</p>

<span class="badge ${order.status}">${order.status}</span>

<select id="status-${order.id}">
<option>Pending</option>
<option>Confirmed</option>
<option>Shipped</option>
<option>Delivered</option>
</select>

<textarea id="msg-${order.id}" placeholder="Admin message">${order.message || ""}</textarea>

<button onclick="updateOrder(${order.id})">Update Order</button>

</div>
`;

});

}

async function updateOrder(id){

let status = document.getElementById(`status-${id}`).value;
let message = document.getElementById(`msg-${id}`).value;

await client
.from("orders")
.update({
status: status,
message: message
})
.eq("id", id);

loadOrders();

}

loadOrders();

/* LIVE REFRESH */
setInterval(loadOrders, 5000);
</script>

</body>
</html>
