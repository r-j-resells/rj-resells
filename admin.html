<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {background:black;color:white;font-family:Arial;padding:20px;}
.card {background:#111;padding:15px;margin:10px;border-radius:10px;}
button {background:gold;border:none;padding:8px;border-radius:5px;margin:5px;}
</style>
</head>

<body>

<h1>Admin Dashboard</h1>
<div id="orders"></div>

<script>
const supabase = supabase.createClient(
"YOUR_URL",
"YOUR_PUBLIC_KEY"
);

async function load(){

let { data } = await supabase.from("orders").select("*");

let html="";

data.forEach(o=>{
html+=`
<div class="card">
<h3>${o.id}</h3>
<p>${o.product}</p>
<p>${o.name}</p>
<p>${o.email}</p>
<p>Status: ${o.status}</p>

<button onclick="update('${o.id}','Shipped')">Shipped</button>
<button onclick="update('${o.id}','Delivered')">Delivered</button>

<br><br>
<input id="m${o.id}" placeholder="Message">
<button onclick="msg('${o.id}')">Send</button>
</div>
`;
});

document.getElementById("orders").innerHTML=html;
}

async function update(id,status){
await supabase.from("orders").update({status}).eq("id",id);
load();
}

async function msg(id){
let m=document.getElementById("m"+id).value;
await supabase.from("orders").update({message:m}).eq("id",id);
load();
}

load();
</script>

</body>
</html>
