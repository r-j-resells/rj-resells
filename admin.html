<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J Admin Dashboard</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
padding:20px;
}

:root{
--bg:#070707;
--card:#111111;
--gold:#89CFF0;
--white:#ffffff;
--gray:#b8b8b8;
}  

/* ADMIN LOGIN OVERLAY */
#adminLock{
position:fixed;
inset:0;
background:#000;
z-index:999999;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
font-family:Arial;
}

#adminLock input{
padding:12px;
margin:10px;
width:250px;
border:none;
border-radius:8px;
background:#111;
color:white;
}

#adminLock button{
padding:12px 20px;
background:#89CFF0;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
width:250px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.stats{
display:flex;
justify-content:space-between;
gap:10px;
margin-bottom:20px;
}

.card{
flex:1;
background:#161616;
padding:15px;
border-radius:10px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
}

.order{
background:#151515;
padding:15px;
border-radius:12px;
border:1px solid #2a2a2a;
}

.badge{
padding:5px 10px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-top:5px;
}

.Pending{
background:#89CFF0;
color:white;
}

.Confirmed{
background:#2196f3;
}

.Shipped{
background:#89CFF0;
color:white;
}

.Delivered{
background:#00c853;
}

input, textarea, select{
width:100%;
padding:8px;
margin-top:8px;
border:none;
border-radius:6px;
background:#0f0f0f;
color:white;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:6px;
background:#89CFF0;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<!-- ADMIN LOGIN -->
<div id="adminLock">

<h1 style="color:baby blue;">Admin Login</h1>

<input id="adminEmail" placeholder="Email">

<input id="adminPassword" type="password" placeholder="Password">

<button id="adminLoginBtn">Login</button>

<p id="adminMsg"></p>

</div>

<h1>R&J Admin Dashboard</h1>

<div class="stats">

<div class="card">
<h3>Total</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pending">0</p>
</div>

<div class="card">
<h3>Shipped</h3>
<p id="shipped">0</p>
</div>

</div>

<div id="orders" class="grid"></div>

<script>

const client = window.supabase.createClient(
"https://fyzguhksswalbwoqatym.supabase.co",
"sb_publishable_bqSCrrSbaWZ0DgYPj3pCTg_732i9dzN"
);

/* YOUR ADMIN USER ID */
const ADMIN_UID = "dce7c480-6575-4f3e-a554-097c180ba0be";

/* LOGIN BUTTON */
document.getElementById("adminLoginBtn").onclick = async () => {

let email = document.getElementById("adminEmail").value;

let password = document.getElementById("adminPassword").value;

const { error } = await client.auth.signInWithPassword({
email,
password
});

if(error){

document.getElementById("adminMsg").innerText = error.message;

return;

}

checkAdmin();

};

/* CHECK ADMIN */
async function checkAdmin(){

const { data } = await client.auth.getUser();

if(!data.user){

document.getElementById("adminLock").style.display = "flex";

return;

}

/* NOT ADMIN */
if(data.user.id !== ADMIN_UID){

document.body.innerHTML = `
<h1 style="color:red;text-align:center;margin-top:100px;">
Access Denied
</h1>
`;

return;

}

/* ADMIN SUCCESS */
document.getElementById("adminLock").style.display = "none";

loadOrders();

}

/* LOAD ORDERS */
async function loadOrders(){

const { data, error } = await client
.from("orders")
.select("*")
.order("id", { ascending:false });

if(error){
console.log("LOAD ERROR:", error);
return;
}

let total = data.length;

let pending = data.filter(o => o.status === "Pending").length;

let shipped = data.filter(o => o.status === "Shipped").length;

document.getElementById("total").innerText = total;
document.getElementById("pending").innerText = pending;
document.getElementById("shipped").innerText = shipped;

let container = document.getElementById("orders");

container.innerHTML = "";

data.forEach(order => {

container.innerHTML += `
<div class="order">

<h3>${order.product}</h3>

<p><b>Name:</b> ${order.name}</p>

<p><b>Email:</b> ${order.email}</p>

<p><b>CashApp:</b> ${order.cashapp || "N/A"}</p>

<p><b>Address:</b> ${order.address}</p>

<span class="badge ${order.status}">
${order.status}
</span>

<select id="status-${order.id}">

<option value="Pending"
${order.status==="Pending"?"selected":""}>
Pending
</option>

<option value="Confirmed"
${order.status==="Confirmed"?"selected":""}>
Confirmed
</option>

<option value="Shipped"
${order.status==="Shipped"?"selected":""}>
Shipped
</option>

<option value="Delivered"
${order.status==="Delivered"?"selected":""}>
Delivered
</option>

</select>

<textarea id="msg-${order.id}"
placeholder="Message">${order.message || ""}</textarea>

<button onclick="updateOrder(${order.id})">
Update Order
</button>

</div>
`;

});

}

/* UPDATE ORDER */
async function updateOrder(id){

let status = document.getElementById(`status-${id}`).value;

let message = document.getElementById(`msg-${id}`).value;

const { error } = await client
.from("orders")
.update({
status: status,
message: message
})
.eq("id", id);

if(error){

console.log("UPDATE ERROR:", error);

return;

}

loadOrders();

}

/* AUTO REFRESH */
setInterval(() => {

if(
document.activeElement.tagName !== "TEXTAREA" &&
document.activeElement.tagName !== "SELECT"
){
loadOrders();
}

}, 5000);

/* START */
checkAdmin();

</script>

</body>
</html>
